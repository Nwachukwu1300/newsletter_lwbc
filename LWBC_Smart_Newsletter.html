<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LWBC Newsletter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@300;400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: #f0ebe3;
    font-family: 'Source Sans 3', sans-serif;
    color: #2c2c2c;
    font-size: 15px;
    line-height: 1.6;
  }

  .email-wrapper {
    max-width: 640px;
    margin: 30px auto;
    background: #ffffff;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }

  .header {
    background-color: #1a3a5c;
    color: #ffffff;
    text-align: center;
    padding: 40px 30px 32px;
  }
  .header .org-name {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .header .tagline {
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #a8c4e0;
    margin-bottom: 20px;
  }
  .header .month-banner {
    display: inline-block;
    background-color: #c8973a;
    color: #fff;
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    padding: 6px 28px;
    border-radius: 2px;
  }
  .header .service-info {
    margin-top: 16px;
    font-size: 13px;
    color: #c8d8e8;
  }

  .quote-banner {
    background-color: #f7f2ea;
    border-left: 4px solid #c8973a;
    padding: 18px 30px;
    font-style: italic;
    font-size: 14px;
    color: #4a4a4a;
  }
  .quote-banner .reference {
    font-style: normal;
    font-weight: 700;
    color: #1a3a5c;
    margin-top: 4px;
    font-size: 13px;
  }

  .section {
    padding: 28px 30px;
    border-bottom: 1px solid #ede9e2;
  }
  .section:last-of-type { border-bottom: none; }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: #1a3a5c;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background-color: #d4c9b5;
  }

  .featured-box {
    background: #1a3a5c;
    color: white;
    border-radius: 4px;
    padding: 20px 24px;
  }
  .featured-box .label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #a8c4e0;
    margin-bottom: 6px;
  }
  .featured-box .title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    margin-bottom: 4px;
    color: #c8973a;
  }
  .featured-box .subtitle {
    font-size: 14px;
    color: #d0dce8;
    margin-bottom: 14px;
  }
  .featured-box .detail {
    font-size: 13px;
    color: #c8d8e8;
    background: rgba(255,255,255,0.07);
    border-radius: 3px;
    padding: 8px 12px;
    margin-top: 6px;
  }
  .featured-box .detail strong { color: #ffffff; }

  .activity-list { list-style: none; }
  .activity-list li {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 10px 0;
    border-bottom: 1px dotted #e0dace;
  }
  .activity-list li:last-child { border-bottom: none; }
  .day-badge {
    background-color: #1a3a5c;
    color: white;
    font-weight: 700;
    font-size: 11px;
    min-width: 36px;
    text-align: center;
    padding: 4px 6px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 1px;
  }
  .activity-details .activity-name { font-weight: 600; color: #1a3a5c; font-size: 14px; }
  .activity-details .activity-time { font-size: 13px; color: #666; margin-top: 1px; }

  .events-grid { display: flex; flex-direction: column; gap: 12px; }
  .event-card { display: flex; border: 1px solid #e0dace; border-radius: 4px; overflow: hidden; }
  .event-date-block {
    background-color: #c8973a;
    color: white;
    min-width: 64px;
    text-align: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 10px 8px;
  }
  .event-date-block .event-month { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.85; }
  .event-date-block .event-day { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; line-height: 1; margin: 2px 0; }
  .event-info { padding: 10px 16px; flex: 1; }
  .event-info .event-name { font-weight: 700; font-size: 15px; color: #1a3a5c; }
  .event-info .event-desc { font-size: 13px; color: #555; margin-top: 2px; }

  .rota-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 4px; }
  .rota-table th { background-color: #1a3a5c; color: #ffffff; text-align: left; padding: 9px 12px; font-weight: 600; font-size: 12px; letter-spacing: 0.5px; }
  .rota-table td { padding: 9px 12px; border-bottom: 1px solid #ede9e2; vertical-align: top; }
  .rota-table tr:nth-child(even) td { background-color: #faf7f2; }
  .rota-table tr:last-child td { border-bottom: none; }
  .rota-table td:first-child { font-weight: 700; color: #1a3a5c; white-space: nowrap; }

  .bullet-list { list-style: none; }
  .bullet-list li { padding: 8px 0 8px 24px; position: relative; font-size: 14px; border-bottom: 1px dotted #e0dace; color: #3a3a3a; }
  .bullet-list li::before { content: '✦'; position: absolute; left: 0; color: #c8973a; font-size: 10px; top: 10px; }
  .bullet-list li:last-child { border-bottom: none; }

  .inline-quote { background-color: #f7f2ea; border-left: 3px solid #1a3a5c; padding: 12px 16px; margin-top: 16px; font-style: italic; font-size: 13px; color: #4a4a4a; }
  .inline-quote .ref { font-style: normal; font-weight: 700; color: #1a3a5c; font-size: 12px; margin-top: 4px; }

  .notice-box { background-color: #eef4fa; border: 1px solid #c0d4e8; border-radius: 4px; padding: 16px 20px; margin-top: 10px; font-size: 13px; }
  .notice-box .notice-title { font-weight: 700; color: #1a3a5c; margin-bottom: 5px; font-size: 14px; }

  .footer { background-color: #1a3a5c; color: #a8c4e0; text-align: center; padding: 28px 30px; font-size: 12px; line-height: 1.8; }
  .footer .footer-org { font-family: 'Playfair Display', serif; font-size: 16px; color: #ffffff; margin-bottom: 8px; }
  .footer a { color: #c8d8e8; }
  .footer .social-links { margin: 12px 0; font-size: 13px; }
  .footer .social-links a { color: #a8c4e0; text-decoration: none; margin: 0 8px; }
  .footer hr { border: none; border-top: 1px solid rgba(255,255,255,0.12); margin: 14px 0; }

  .no-data {
    text-align: center;
    padding: 60px 30px;
    color: #888;
    font-size: 14px;
  }
  .no-data strong { display: block; font-size: 18px; color: #1a3a5c; margin-bottom: 8px; }

  @media (max-width: 480px) {
    .email-wrapper { margin: 0; border-radius: 0; }
    .section { padding: 22px 18px; }
    .header { padding: 28px 18px; }
    .rota-table { font-size: 12px; }
  }
</style>
</head>
<body>

<div class="email-wrapper" id="newsletter"></div>

<script>

/* ==========================================================

   ==========================================================
   Each key is a month number: 1 = January, 12 = December.
   Only fill in the months you send a newsletter for.
   Leave out any month you don't use.
   ========================================================== */

const yearlyData = {

  1: { // JANUARY
    month: "January 2026",
    quote: "Your January quote or verse goes here.",
    quoteRef: "— Source / Reference",
    seriesLabel: "Current Series",
    seriesTitle: "Series Title",

    seriesDetails: [
      { label: "Detail", value: "Value" },
    ],
    events: [

      rows: [

      ]

    prayerQuoteRef: "— Source / Reference",
    sundaySchoolRota: {
      rows: [
        ["04 Jan 2026", "Name", "Name"],

    ],

  2: { // FEBRUARY
    month: "February 2026",
    quote: "Your February quote or verse goes here.",
    quoteRef: "— Source / Reference",
    seriesLabel: "Current Series",
    seriesTitle: "Series Title",
    seriesSubtitle: "Series subtitle or description",
    seriesDetails: [
      { label: "Detail", value: "Value" },
    ],
    events: [
      { day: "01", month: "Feb", name: "Event Name", desc: "Short description of the event." },
      { day: "22", month: "Feb", name: "Event Name", desc: "Short description of the event." },
    ],
    rota: {
      columns: ["Date", "Welcome", "Hospitality", "Prayer"],
      rows: [
        ["01 Feb", "Name", "Name, Name", "Name"],
        ["08 Feb", "Name", "Name, Name", "Name"],
        ["15 Feb", "Name", "Name, Name", "Name"],
        ["22 Feb", "Name", "Name, Name", "Name"],
      ]
    },
    prayerPoints: [
      "Prayer point one",
      "Prayer point two",
      "Prayer point three",
    ],
    prayerQuote: "A closing quote for the prayer section.",
    prayerQuoteRef: "— Source / Reference",
    sundaySchoolRota: {
      rows: [
        ["01 Feb 2026", "Name", "Name"],
        ["08 Feb 2026", "Name", "Name"],
        ["15 Feb 2026", "Name", "Name"],
        ["22 Feb 2026", "Name", "Name"],
      ]
    },
    announcements: [
      { title: "Announcement Title", body: "Announcement body text goes here." },
    ],
  },

  3: { // MARCH
    month: "March 2026",
    quote: "Your March quote or verse goes here.",
    quoteRef: "— Source / Reference",
    seriesLabel: "Current Series",
    seriesTitle: "Series Title",
    seriesSubtitle: "Series subtitle or description",
    seriesDetails: [
      { label: "Detail", value: "Value" },
    ],
    events: [
      { day: "08", month: "Mar", name: "Event Name", desc: "Short description of the event." },
      { day: "29", month: "Mar", name: "Event Name", desc: "Short description of the event." },
    ],
    rota: {
      columns: ["Date", "Welcome", "Hospitality", "Prayer"],
      rows: [
        ["01 Mar", "Name", "Name, Name", "Name"],
        ["08 Mar", "Name", "Name, Name", "Name"],
        ["15 Mar", "Name", "Name, Name", "Name"],
        ["22 Mar", "Name", "Name, Name", "Name"],
        ["29 Mar", "Name", "Name, Name", "Name"],
      ]
    },
    prayerPoints: [
      "Prayer point one",
      "Prayer point two",
      "Prayer point three",
    ],
    prayerQuote: "A closing quote for the prayer section.",
    prayerQuoteRef: "— Source / Reference",
    sundaySchoolRota: {
      rows: [
        ["01 Mar 2026", "Name", "Name"],
        ["08 Mar 2026", "Name", "Name"],
        ["15 Mar 2026", "Name", "Name"],
        ["22 Mar 2026", "Name", "Name"],
        ["29 Mar 2026", "Name", "Name"],
      ]
    },
    announcements: [
      { title: "Announcement Title", body: "Announcement body text goes here." },
    ],
  },

  /* --- Copy the block above and paste for months 4–12 --- */
  /* --- Just change the number and fill in the details   --- */

};

/* ==========================================================
   FIXED INFO — stays the same every month
   Only change this if your church details change
   ========================================================== */

const churchInfo = {
  name: "Limbrick Wood Baptist Church",
  tagline: "Knowing Jesus · Making Jesus Known",
  serviceInfo: "Come worship with us every Sunday at 10:45 a.m.",
  activities: [
    { day: "Mon", name: "The Den — For Young People", time: "Mondays, 6:45pm–8:00pm (except school holidays)" },
    { day: "Tue", name: "Bible Study Group 1", time: "Tuesdays, 7:30pm · Hardiman Room" },
    { day: "Thu", name: "Bible Study Group 2", time: "Thursdays, 2:00pm · Hardiman Room" },
    { day: "Thu", name: "Bible Study Group 3 — Online", time: "Thursdays, 8:00pm", link: { text: "Join online meeting", url: "#" } },
  ],
  sundaySchoolNotices: [
    { title: "Sunday School Info", body: "Children from Reception to Year 5 go to the Hardiman Room during the sermon for Bible stories and activities. Parents are encouraged to accompany little ones for the first few visits. Children return at the end of the service." },
    { title: "Children & Youth Ministry", body: "Young people (ages 10–16) have their own Bible learning time during the sermon. The last Sunday of each month is a Family Service — all children remain in church." },
    { title: "Crèche Provision", body: "There is a dedicated area at the back of the church for parents with small children." },
  ],
  footer: {
    address: "Corner of Jardine Crescent and Faseman Avenue, Tile Hill, Coventry, West Midlands CV4 9RD · United Kingdom",
    socials: [
      { label: "Facebook", url: "#" },
      { label: "YouTube", url: "#" },
      { label: "Instagram", url: "#" },
    ]
  }
};

/* ==========================================================
   RENDERING — no need to touch anything below this line
   ========================================================== */

function render() {
  const currentMonth = new Date().getMonth() + 1; // 1–12
  const data = yearlyData[currentMonth];
  const el = document.getElementById('newsletter');

  if (!data) {
    el.innerHTML = `
      <div class="no-data">
        <strong>No newsletter this month</strong>
        No data has been entered for this month yet.<br>
        Open the HTML file and add an entry to <code>yearlyData</code> for month ${currentMonth}.
      </div>`;
    return;
  }

  // Header
  let html = `
    <div class="header">
      <div class="org-name">${churchInfo.name}</div>
      <div class="tagline">${churchInfo.tagline}</div>
      <div class="month-banner">${data.month} Newsletter</div>
      <div class="service-info">${churchInfo.serviceInfo}</div>
    </div>

    <div class="quote-banner">
      ${data.quote}
      <div class="reference">${data.quoteRef}</div>
    </div>

    <div class="section">
      <div class="section-title">Sermon Series</div>
      <div class="featured-box">
        <div class="label">${data.seriesLabel}</div>
        <div class="title">${data.seriesTitle}</div>
        <div class="subtitle">${data.seriesSubtitle}</div>
        ${data.seriesDetails.map(d => `<div class="detail"><strong>${d.label}:</strong> ${d.value}</div>`).join('')}
      </div>
    </div>

    <div class="section">
      <div class="section-title">Weekly Activities</div>
      <ul class="activity-list">
        ${churchInfo.activities.map(a => `
          <li>
            <div class="day-badge">${a.day}</div>
            <div class="activity-details">
              <div class="activity-name">${a.name}</div>
              <div class="activity-time">${a.time}${a.link ? ` · <a href="${a.link.url}" style="color:#c8973a;">${a.link.text}</a>` : ''}</div>
            </div>
          </li>`).join('')}
      </ul>
    </div>

    <div class="section">
      <div class="section-title">Upcoming Events</div>
      <div class="events-grid">
        ${data.events.map(e => `
          <div class="event-card">
            <div class="event-date-block">
              <div class="event-month">${e.month}</div>
              <div class="event-day">${e.day}</div>
            </div>
            <div class="event-info">
              <div class="event-name">${e.name}</div>
              <div class="event-desc">${e.desc}</div>
            </div>
          </div>`).join('')}
      </div>
    </div>

    <div class="section">
      <div class="section-title">Sunday Rota</div>
      <table class="rota-table">
        <thead><tr>${data.rota.columns.map(c => `<th>${c}</th>`).join('')}</tr></thead>
        <tbody>${data.rota.rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('')}</tbody>
      </table>
    </div>

    <div class="section">
      <div class="section-title">Prayer Focus</div>
      <ul class="bullet-list">
        ${data.prayerPoints.map(p => `<li>${p}</li>`).join('')}
      </ul>
      <div class="inline-quote">
        ${data.prayerQuote}
        <div class="ref">${data.prayerQuoteRef}</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Children's Sunday School Rota</div>
      <table class="rota-table">
        <thead><tr><th>Date</th><th>Teacher</th><th>Helper</th></tr></thead>
        <tbody>${data.sundaySchoolRota.rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('')}</tbody>
      </table>
      ${churchInfo.sundaySchoolNotices.map(n => `
        <div class="notice-box" style="margin-top:10px;">
          <div class="notice-title">${n.title}</div>
          ${n.body}
        </div>`).join('')}
    </div>

    ${data.announcements && data.announcements.length ? `
    <div class="section">
      <div class="section-title">Announcements</div>
      ${data.announcements.map(a => `
        <div class="notice-box">
          <div class="notice-title">${a.title}</div>
          ${a.body}
        </div>`).join('')}
    </div>` : ''}

    <div class="footer">
      <div class="footer-org">${churchInfo.name}</div>
      <div>${churchInfo.footer.address}</div>
      <hr>
      <div class="social-links">
        ${churchInfo.footer.socials.map((s, i) => `<a href="${s.url}">${s.label}</a>${i < churchInfo.footer.socials.length - 1 ? ' · ' : ''}`).join('')}
      </div>
      <hr>
      <div style="font-size:11px;color:#7a95b0;">
        You are receiving this email as a member or friend of LWBC.
      </div>
    </div>`;

  el.innerHTML = html;
}

render();
</script>
</body>
</html>
